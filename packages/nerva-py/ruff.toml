target-version = "py311"
line-length = 100

[lint]
select = [
  "E",    # pycodestyle errors
  "F",    # pyflakes
  "I",    # isort
  "UP",   # pyupgrade
  "B",    # flake8-bugbear
  "SIM",  # flake8-simplify
  "RUF",  # ruff-specific rules
  "ANN401",  # ban Any type usage
]

[lint.per-file-ignores]
"tests/**" = ["B011", "ANN401"]
