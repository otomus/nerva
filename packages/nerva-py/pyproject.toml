[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nerva"
version = "0.2.0"
description = "Composable Agent Primitives — build your agent system, not the plumbing around it"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Oron Mozes"}]
requires-python = ">=3.11"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "pyyaml>=6.0",
]

[project.urls]
Homepage = "https://otomus.github.io/nerva/"
Documentation = "https://otomus.github.io/nerva/docs/"
Repository = "https://github.com/otomus/nerva"
Issues = "https://github.com/otomus/nerva/issues"

[project.optional-dependencies]
native = ["nerva-core"]

[tool.hatch.build.targets.wheel]
packages = ["nerva"]
