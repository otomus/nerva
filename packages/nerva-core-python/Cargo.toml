[package]
name = "nerva-core-python"
version = "0.1.0"
edition = "2021"
description = "Python bindings for nerva-core via PyO3"

[lib]
name = "nerva_core"
crate-type = ["cdylib"]

[dependencies]
nerva_core_rs = { package = "nerva-core", path = "../nerva-core" }
pyo3 = { version = "0.25", features = ["extension-module"] }
serde_json = "1"
