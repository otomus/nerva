name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: "nerva-py (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: packages/nerva-py
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check nerva/ tests/

      - name: Type check
        run: mypy nerva/

      - name: Test
        run: python -m pytest tests/ -q

  python-native:
    name: "nerva-py + native (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: packages/nerva-py
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: pip install maturin

      - name: Build native module
        working-directory: packages/nerva-core-python
        run: maturin develop

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Test (with native module)
        run: python -m pytest tests/ -q

  node:
    name: "nerva-js (Node ${{ matrix.node-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    defaults:
      run:
        working-directory: packages/nerva-js
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

  node-native:
    name: "nerva-js + native (Node ${{ matrix.node-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build native module
        working-directory: packages/nerva-core-node
        run: |
          npm ci
          npm run build

      - name: Install nerva-js deps
        working-directory: packages/nerva-js
        run: npm ci

      - name: Link native module
        working-directory: packages/nerva-js
        run: npm link ../nerva-core-node

      - name: Test (with native module)
        working-directory: packages/nerva-js
        run: npm test

  rust-core:
    name: "nerva-core (Rust)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check
        working-directory: packages/nerva-core
        run: cargo check

      - name: Test
        working-directory: packages/nerva-core
        run: cargo test

      - name: Check node bindings
        working-directory: packages/nerva-core-node
        run: cargo check

      - name: Check go bindings
        working-directory: packages/nerva-core-go
        run: cargo check

  cli:
    name: "nerva-cli (Node 22)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/nerva-cli
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test
