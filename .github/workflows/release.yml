name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish-py:
    uses: ./.github/workflows/release-py.yml
    secrets: inherit

  publish-js:
    uses: ./.github/workflows/release-js.yml
    secrets: inherit

  create-release:
    name: Create GitHub Release
    needs: [publish-py, publish-js]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
